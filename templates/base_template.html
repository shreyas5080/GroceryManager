<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block Title %} {% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename = 'styling.css') }} ">

    <style>
        .theader {
         background-image: url("{{ url_for('static', filename='images/sky-with-dawn.jpg') }}");
         background-size: cover;
         background-position: center;
         min-height: 300px;
         display: flex;
         justify-content: center;
         color: #0f0f0f;
         }

    </style>
</head>
<body>

        <header class="theader">
            <nav class="navigation">
                <a href="{{ url_for('the_user') }}">
                    My Profile
                </a>

                <a href="{{ url_for('home') }}" >
                    Homepage
                </a>

                <a href="{{ url_for('logout') }}">
                    Logout
                </a>

                <a href="{{ url_for('add') }}" onclick="alert('Please, log in or sign up first')">
                    Add
                </a>

                <a href="{{ url_for('login') }}">
                    Login
                </a>

                <a href="{{ url_for('register') }}">
                    Register
                </a>

                <a href="{{ url_for('print_groceries') }}" onclick="alert('Please, log in or sign up first')">
                    Groceries
                </a>
            </nav>
        </header>

        {% block content %}
        {% endblock %}
</body>
</html>
