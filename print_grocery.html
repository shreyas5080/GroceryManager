{% extends "base_template.html" %}

{% block Title %} My groceries {% endblock %}

{% block content %}

    <table border="2">
           <tr>
               <th>
                   Name
               </th>
               <th>
                   Quantity
               </th>
           </tr>

            {% for item in results %}

                 <tr>
                     <td> {{ item[0] }} </td>
                     <td> {{ item[1] }} </td>
                 </tr>

            {% endfor %}

    </table>

    <a href="{{ url_for('add') }}">
        <button class="rounded-button">
            Add
        </button>
    </a>

{% endblock %}
